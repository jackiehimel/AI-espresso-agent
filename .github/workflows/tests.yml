name: Tests

# runs on every push + PR. blocks merge if tests fail.
# kept stdlib-only (unittest) so cron + tests share the same install.

on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "agent/**"
      - ".github/workflows/tests.yml"

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install deps
        working-directory: agent
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: run unittest
        working-directory: agent
        run: python -m unittest discover -s tests -p "test_*.py" -v
