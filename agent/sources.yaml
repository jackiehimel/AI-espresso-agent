  # NOTE: HBR, MIT Sloan, a16z, and MIT Sloan Review are intentionally
  # *not* listed. They generate "3 habits for AI teams" style think pieces
  # that consistently fail the vibe filter (see espresso_agent.py). They
  # can be added back as Tier 4 if you need a CXO-leadership angle.

# ─── CONFIGURATION RULES ─────────────────────────────────────────────────
rules:
  tier1_minimum: 1            # at least one Tier 1 story per edition
  total_stories: 3            # 3 stories + 1 try-this-prompt tile = 4 across
  tier4_rotation_days: [1, 4] # Mon (1) and Thu (4) include a Tier 4 story
  dedupe_window_days: 30      # don't repeat a story or source-event within 30d
  paywall_handling: headline_only   # never fabricate body for paywalled sources
