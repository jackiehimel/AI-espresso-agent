  # ─── TIER 3 — Aggregators (breadth check; never quoted directly) ───────
  - name: The Rundown AI
    tier: 3
    url: https://www.therundown.ai/
    kind: html
    enabled: true
    aggregator: true
  - name: Superhuman AI
    tier: 3
    url: https://www.joinsuperhuman.ai/
    kind: html
    enabled: false
    aggregator: true
  - name: TLDR AI
    tier: 3
    url: https://tldr.tech/ai
    kind: html
