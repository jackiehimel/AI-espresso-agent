    vertical: healthcare
  - name: Supply Chain Dive — AI
    tier: 4
    url: https://www.supplychaindive.com/topic/artificial-intelligence/
    kind: html
    enabled: false
    vertical: supply_chain
  - name: FreightWaves — AI
    tier: 4
    url: https://www.freightwaves.com/news/tag/artificial-intelligence
    kind: html
    enabled: true
    vertical: supply_chain
  - name: MIT Technology Review — AI
    tier: 4
    url: https://www.technologyreview.com/topic/artificial-intelligence/
    kind: html
    enabled: true
    vertical: smb
  - name: Axios AI+
    tier: 4
    url: https://www.axios.com/technology/artificial-intelligence
    kind: html
    enabled: false
    vertical: cross
  - name: Semafor Technology
    tier: 4
